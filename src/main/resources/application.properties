# ============================================
# Smart ERP - Security Module Configuration
# ============================================

# Active Profile (oracle/postgresql)
spring.profiles.active=oracle

# Server
server.port=8080
server.servlet.context-path=/api/v1

# JWT Configuration (Global fallback)
jwt.secret=SmartERP_SecretKey_2024_VeryLongAndSecureKeyForJWTTokenGeneration
jwt.expiration-minutes=30

# Internationalization
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Security
spring.security.filter.order=10

logging.level.org.springframework.security=DEBUG

# SpringDoc OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.deepLinking=true
springdoc.swagger-ui.displayRequestDuration=true

# Group APIs by package
springdoc.group-configs[0].group=security
springdoc.group-configs[0].packages-to-scan=com.smart.erp.security.controller
springdoc.group-configs[0].paths-to-match=/auth/**,/users/**,/roles/**,/user-roles/**,/functions/**,/menus/**,/menu-details/**,/user-menus/**

# API Configuration
api.public-paths=/auth/**,/public/**
api.swagger-paths=/swagger-ui/**,/swagger-ui.html,/api-docs/**,/v3/api-docs/**,/swagger-resources/**,/webjars/**