# ============================================
# Smart ERP - Security Module Configuration
# ============================================

# Active Profile (oracle/postgresql)
spring.profiles.active=oracle

# Server
server.port=8080
server.servlet.context-path=/api/v1

# JWT Configuration (Global fallback)
jwt.secret=SmartERP_SecretKey_2024_VeryLongAndSecureKeyForJWTTokenGeneration
jwt.expiration-minutes=30

# ============================================
# Springdoc / Swagger Configuration
# ============================================
#
# FIX: The context-path (/api/v1) is automatically prepended by Spring to ALL
# paths, including Springdoc ones. Do NOT manually include /api/v1 here ?
# doing so doubles the prefix and causes the 500 "Fetch error" in Swagger UI.
#
# With these settings, the final accessible URLs will be:
#   Swagger UI  ? http://localhost:8080/api/v1/swagger-ui/index.html
#   API JSON    ? http://localhost:8080/api/v1/api-docs
#
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

# Show all endpoints including actuator (optional)
springdoc.show-actuator=false

# Sort endpoints alphabetically in the UI (optional)
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha