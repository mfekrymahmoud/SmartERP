# ============================================
# Smart ERP - Security Module Configuration
# ============================================

# Active Profile (oracle/postgresql)
spring.profiles.active=oracle

# Server
server.port=8080
server.servlet.context-path=/api/v1

# JWT Configuration (Global fallback)
jwt.secret=SmartERP_SecretKey_2024_VeryLongAndSecureKeyForJWTTokenGeneration
jwt.expiration-minutes=30

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# This prevents the "Fetch error 500" by explicitly mapping the config URL
springdoc.swagger-ui.config-url=/api/v1/api-docs/swagger-config
springdoc.swagger-ui.url=/api/v1/api-docs

